name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build
        env:
          VITE_API_BASE_URL: https://api.revenuepoint.com
          VITE_USE_MOCKS: 'false'
          VITE_DD_APP_ID: ${{ secrets.VITE_DD_APP_ID }}
          VITE_DD_CLIENT_TOKEN: ${{ secrets.VITE_DD_CLIENT_TOKEN }}
          VITE_DD_SITE: ${{ secrets.VITE_DD_SITE }}
          VITE_DD_SERVICE: workspace
          VITE_DD_ENV: production
          VITE_GA_ID: ${{ secrets.VITE_GA_ID }}
        run: npm run build

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    # Pages deployments for this site routinely take ~10 minutes to process
    # backend-side — the action's 10-minute default timeout made deploys a
    # coin flip (and retries of a cancelled SHA get insta-cancelled).
    timeout-minutes: 45
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
        with:
          timeout: 1800000
